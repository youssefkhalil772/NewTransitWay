name: transite_way
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  google_nav_bar: ^5.0.6
  visibility_detector: ^0.4.0+2
  geolocator: ^13.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  shared_preferences: ^2.5.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.2
  flutter_screenutil: ^5.9.3
  dots_indicator: ^4.0.1
  smooth_page_indicator: ^2.0.1
  supabase_flutter: ^2.12.4
  http: ^1.6.0
  flutter_bloc: ^8.1.3
  mobile_scanner: ^7.2.0
  overlay_support: ^2.1.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  image_cropper: ^8.0.2
  crop: ^0.4.1
  path_provider: ^2.1.2
  google_sign_in: ^6.2.1
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^5.0.0

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/TransitWayLogo.png"
  adaptive_icon_background: "#065F46"
  adaptive_icon_foreground: "assets/logo/TransitWayLogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
